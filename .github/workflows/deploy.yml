name: Deploy to Cloudflare Pages
on:
  push:
    branches:
      - main
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Remove stale build artifacts from web/
        run: |
          rm -f web/main.dart.js
          rm -f web/flutter_bootstrap.js
          rm -f web/flutter_service_worker.js
          rm -f web/flutter.js
          rm -f web/version.json
          rm -rf web/canvaskit
          rm -rf web/assets
      - name: Install Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.4'
          channel: 'stable'
      - name: Install dependencies
        run: flutter pub get
      - name: Build web
        run: flutter build web --release --base-href "/app/"
      - name: Copy static assets to build output
        run: |
          # Flutter shell at root; JS/assets under /app/ (no index in /app/ — avoids /app/ redirect loops)
          mkdir -p build/web/app
          mv build/web/index.html build/web/gearsh-app.html
          for item in main.dart.js flutter.js flutter_bootstrap.js flutter_service_worker.js version.json canvaskit assets; do
            if [ -e "build/web/$item" ]; then
              mv "build/web/$item" "build/web/app/$item"
            fi
          done
          # Marketing static assets at site root
          mkdir -p build/web/assets/images/artists build/web/assets/images
          cp -r assets/images/artists/* build/web/assets/images/artists/
          cp assets/images/command-header.png build/web/assets/images/command-header.png 2>/dev/null || true
          cp -r web/icons build/web/icons 2>/dev/null || true
          cp web/gearsh-brand.css build/web/gearsh-brand.css 2>/dev/null || true
          cp web/discovery.css build/web/discovery.css 2>/dev/null || true
          cp web/artist-feed.js build/web/artist-feed.js 2>/dev/null || true
          cp web/gearsh-ui.js build/web/gearsh-ui.js 2>/dev/null || true
          cp web/search.html build/web/search.html 2>/dev/null || true
          cp web/search-page.js build/web/search-page.js 2>/dev/null || true
          cp web/artists.html build/web/artists.html 2>/dev/null || true
          cp web/artists-page.js build/web/artists-page.js 2>/dev/null || true
          cp web/marketing.html build/web/index.html
          cp web/join-gig.html build/web/join-gig.html
          cp web/artist-onboarding.html build/web/artist-onboarding.html
          cp web/auth.html build/web/auth.html
          cp web/login.html build/web/login.html
          cp web/artist-dashboard.html build/web/artist-dashboard.html
          cp web/gearsh-god.html build/web/gearsh-god.html
          cp web/book-gig.html build/web/book-gig.html
          cp web/claim-profile.html build/web/claim-profile.html
          cp web/sa-showcase-data.js build/web/sa-showcase-data.js
          cp web/day-genre-schedule.js build/web/day-genre-schedule.js 2>/dev/null || true
          cp web/following-feed.html build/web/following-feed.html 2>/dev/null || true
          cp web/activity-feed.css build/web/activity-feed.css 2>/dev/null || true
          cp web/activity-feed.js build/web/activity-feed.js 2>/dev/null || true
          cp web/activity-create.js build/web/activity-create.js 2>/dev/null || true
          cp web/gig-create.js build/web/gig-create.js 2>/dev/null || true
          cp web/master-profile-manage.js build/web/master-profile-manage.js 2>/dev/null || true
          cp web/artist-profile-setup.js build/web/artist-profile-setup.js 2>/dev/null || true
          cp web/artist-services-manage.js build/web/artist-services-manage.js 2>/dev/null || true
          cp web/collaborate.html build/web/collaborate.html 2>/dev/null || true
          cp web/collaborate.js build/web/collaborate.js 2>/dev/null || true
          cp web/glog.html build/web/glog.html 2>/dev/null || true
          cp web/glog-post.html build/web/glog-post.html 2>/dev/null || true
          cp web/glog-data.js build/web/glog-data.js 2>/dev/null || true
          cp web/glog-page.js build/web/glog-page.js 2>/dev/null || true
          cp web/glog-post.js build/web/glog-post.js 2>/dev/null || true
          cp web/glog.css build/web/glog.css 2>/dev/null || true
          cp web/gearsh.html build/web/gearsh.html 2>/dev/null || true
          cp web/master-profile.css build/web/master-profile.css 2>/dev/null || true
          cp web/master-profile.js build/web/master-profile.js 2>/dev/null || true
          cp web/gig-guide.html build/web/gig-guide.html 2>/dev/null || true
          cp web/gig-guide.css build/web/gig-guide.css 2>/dev/null || true
          cp web/gig-guide.js build/web/gig-guide.js 2>/dev/null || true
          cp web/gig-detail.html build/web/gig-detail.html 2>/dev/null || true
          cp web/tickets.css build/web/tickets.css 2>/dev/null || true
          cp web/terms.html build/web/terms.html
          cp web/privacy.html build/web/privacy.html
          cp web/_redirects build/web/_redirects
          cp web/_headers build/web/_headers 2>/dev/null || true
          cp web/robots.txt build/web/robots.txt 2>/dev/null || true
          cp web/sitemap.xml build/web/sitemap.xml 2>/dev/null || true
          # Cloudflare Pages Functions + D1 config
          mkdir -p build/web/functions/api build/web/functions/book build/web/functions/act
          cp functions/_og-utils.js build/web/functions/_og-utils.js
          cp -r functions/api/* build/web/functions/api/
          cp -r functions/book/* build/web/functions/book/ 2>/dev/null || true
          cp -r functions/act/* build/web/functions/act/ 2>/dev/null || true
          for f in web/functions/api/*.js; do
            case "$(basename "$f")" in signup.js|login.js|auth-utils.js) continue ;; esac
            cp "$f" build/web/functions/api/
          done
          cp functions/api/auth-utils.js build/web/functions/api/auth-utils.js
          cp web/wrangler.toml build/web/wrangler.toml 2>/dev/null || true
      - name: Cache-bust JS/CSS references in HTML
        run: |
          VERSION=$(git rev-parse --short HEAD)
          echo "Asset version: $VERSION"
          ASSETS="day-genre-schedule sa-showcase-data artist-feed gearsh-ui search-page artists-page glog-data glog-page glog-post activity-feed activity-create gearsh-brand discovery glog"
          for html in build/web/*.html; do
            [ -f "$html" ] || continue
            for asset in $ASSETS; do
              sed -i "s/${asset}\\.js\"/${asset}.js?v=${VERSION}\"/g" "$html"
              sed -i "s/${asset}\\.css\"/${asset}.css?v=${VERSION}\"/g" "$html"
              sed -i "s/${asset}\\.js?v=[^\"]*\"/${asset}.js?v=${VERSION}\"/g" "$html"
              sed -i "s/${asset}\\.css?v=[^\"]*\"/${asset}.css?v=${VERSION}\"/g" "$html"
            done
          done
      - name: Verify deployment bundle
        run: |
          test -f build/web/_redirects
          test -f build/web/gearsh-app.html
          test ! -f build/web/app/index.html
          grep -q "flutter_bootstrap" build/web/gearsh-app.html
          grep -q "gearsh-app.html" build/web/_redirects
          echo "Deployment bundle OK"
      - name: Validate Pages Functions bundle
        run: npx wrangler@3 pages functions build build/web/functions --outdir /tmp/gearsh-functions-bundle
      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy build/web --project-name=thegearsh-com
      - name: Purge Cloudflare CDN cache
        continue-on-error: true
        run: |
          set -euo pipefail
          ZONE_ID=$(curl -fsSL \
            -H "Authorization: Bearer ${{ secrets.CLOUDFLARE_API_TOKEN }}" \
            "https://api.cloudflare.com/client/v4/zones?name=thegearsh.com" \
            | jq -r '.result[0].id // empty')
          if [ -z "$ZONE_ID" ]; then
            echo "::warning::Could not resolve zone ID for thegearsh.com — skip CDN purge."
            exit 0
          fi
          curl -fsSL -X POST \
            "https://api.cloudflare.com/client/v4/zones/${ZONE_ID}/purge_cache" \
            -H "Authorization: Bearer ${{ secrets.CLOUDFLARE_API_TOKEN }}" \
            -H "Content-Type: application/json" \
            --data '{"purge_everything":true}'
          echo "CDN cache purged."
