name: Deploy to Cloudflare Pages
on:
  push:
    branches:
      - main
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Remove stale build artifacts from web/
        run: |
          rm -f web/main.dart.js
          rm -f web/flutter_bootstrap.js
          rm -f web/flutter_service_worker.js
          rm -f web/flutter.js
          rm -f web/version.json
          rm -rf web/canvaskit
          rm -rf web/assets
      - name: Install Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.4'
          channel: 'stable'
      - name: Install dependencies
        run: flutter pub get
      - name: Build web
        run: flutter build web --release --base-href "/app/"
      - name: Copy static assets to build output
        run: |
          # Flutter shell at root; JS/assets under /app/ (no index in /app/ — avoids /app/ redirect loops)
          mkdir -p build/web/app
          mv build/web/index.html build/web/gearsh-app.html
          for item in main.dart.js flutter.js flutter_bootstrap.js flutter_service_worker.js version.json canvaskit assets; do
            if [ -e "build/web/$item" ]; then
              mv "build/web/$item" "build/web/app/$item"
            fi
          done
          # Marketing static assets at site root
          mkdir -p build/web/assets/images/artists build/web/assets/images
          cp -r assets/images/artists/* build/web/assets/images/artists/
          cp assets/images/command-header.png build/web/assets/images/command-header.png 2>/dev/null || true
          cp -r web/icons build/web/icons 2>/dev/null || true
          cp web/gearsh-brand.css build/web/gearsh-brand.css 2>/dev/null || true
          cp web/marketing.html build/web/index.html
          cp web/join-gig.html build/web/join-gig.html
          cp web/artist-onboarding.html build/web/artist-onboarding.html
          cp web/auth.html build/web/auth.html
          cp web/login.html build/web/login.html
          cp web/artist-dashboard.html build/web/artist-dashboard.html
          cp web/gearsh-god.html build/web/gearsh-god.html
          cp web/book-gig.html build/web/book-gig.html
          cp web/claim-profile.html build/web/claim-profile.html
          cp web/sa-showcase-data.js build/web/sa-showcase-data.js
          cp web/terms.html build/web/terms.html
          cp web/privacy.html build/web/privacy.html
          cp web/_redirects build/web/_redirects
          # Cloudflare Pages Functions + D1 config
          mkdir -p build/web/functions/api build/web/functions/book
          cp -r functions/api/* build/web/functions/api/
          cp -r functions/book/* build/web/functions/book/ 2>/dev/null || true
          for f in web/functions/api/*.js; do
            case "$(basename "$f")" in signup.js|login.js|auth-utils.js) continue ;; esac
            cp "$f" build/web/functions/api/
          done
          cp functions/api/auth-utils.js build/web/functions/api/auth-utils.js
          cp web/wrangler.toml build/web/wrangler.toml 2>/dev/null || true
      - name: Verify deployment bundle
        run: |
          test -f build/web/_redirects
          test -f build/web/gearsh-app.html
          test ! -f build/web/app/index.html
          grep -q "flutter_bootstrap" build/web/gearsh-app.html
          grep -q "gearsh-app.html" build/web/_redirects
          echo "Deployment bundle OK"
      - name: Validate Pages Functions bundle
        run: npx wrangler@3 pages functions build build/web/functions --outdir /tmp/gearsh-functions-bundle
      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy build/web --project-name=thegearsh-com
