name: gearsh_app
description: "Gearsh - Get Booked. Get Paid. Go Global. South African direct marketplace for artists, DJs, beatmakers, producers & photographers."
publish_to: 'none'
version: 1.0.0+4

environment:
  sdk: '>=3.5.0 <4.0.0'
  flutter: '>=3.24.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_web_plugins:
    sdk: flutter

  # State Management
  flutter_riverpod: ^3.3.2
  riverpod_annotation: ^4.0.3

  # Firebase
  firebase_core:
  firebase_auth:
  cloud_firestore:
  firebase_storage:
  firebase_crashlytics:
  firebase_analytics:

  # Networking & Utils
  dio: ^5.3.2
  http: ^1.6.0
  connectivity_plus: ^6.0.0

  # UI & Experience
  go_router: ^17.0.1
  google_fonts: ^6.2.0
  cached_network_image: ^3.4.0
  shimmer: ^3.0.0
  flutter_staggered_grid_view: ^0.7.0
  pull_to_refresh_flutter3: ^2.0.0
  flutter_animate: ^4.3.0
  flex_color_scheme: ^8.2.0

  # Offline-first
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  shared_preferences: ^2.5.4

  # Others
  intl: ^0.20.2
  cupertino_icons: ^1.0.6
  google_maps_flutter: ^2.4.0
  table_calendar: ^3.0.9
  fl_chart: ^0.68.0
  geocoding: ^4.0.0
  fuzzywuzzy: ^1.2.0
  google_sign_in: ^6.2.1
  sign_in_with_apple: ^6.1.4
  crypto: ^3.0.6
  url_launcher: ^6.2.1
  package_info_plus: ^8.0.0
  image_picker: ^1.0.7

dev_dependencies:
  flutter_test:
    sdk: flutter
  build_runner: ^2.4.6
  riverpod_generator: ^4.0.4
  freezed: ^3.0.6
  json_serializable: ^6.7.1
  flutter_launcher_icons: ^0.14.1
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true

  fonts:
    - family: Syne
      fonts:
        - asset: assets/fonts/Syne-Regular.ttf
          weight: 400
        - asset: assets/fonts/Syne-Medium.ttf
          weight: 500
        - asset: assets/fonts/Syne-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Syne-Bold.ttf
          weight: 700
        - asset: assets/fonts/Syne-ExtraBold.ttf
          weight: 800

  assets:
    - assets/images/
    - assets/images/artists/
    - assets/fonts/
