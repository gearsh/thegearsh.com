  <title>Get Booked. Get Paid. Go Global. | Gearsh</title>
  <link rel="manifest" href="manifest.json">

  <!-- Structured Data: WebSite -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "WebSite",
    "name": "Gearsh",
    "url": "https://thegearsh.com/",
    "description": "The global marketplace to book creative talent. Connect with DJs, photographers, videographers, musicians, and artists worldwide for your events.",
    "potentialAction": {
      "@type": "SearchAction",
      "target": {
        "@type": "EntryPoint",
        "urlTemplate": "https://thegearsh.com/search?q={search_term_string}"
      },
      "query-input": "required name=search_term_string"
    }
  }
  </script>

  <!-- Structured Data: Organization -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "Organization",
    "name": "Gearsh",
    "url": "https://thegearsh.com/",
    "logo": "https://thegearsh.com/icons/Icon-512.png",
    "sameAs": [],
    "contactPoint": {
      "@type": "ContactPoint",
      "contactType": "customer support",
      "availableLanguage": "English"
    }
  }
  </script>

  <style>
    * {
      -webkit-tap-highlight-color: transparent;
      -webkit-touch-callout: none;
      -webkit-user-select: none;
      user-select: none;
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background-color: #020617;
      overscroll-behavior: none;
      padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
    }

    body {
      -webkit-user-select: none;
      -moz-user-select: none;
      -ms-user-select: none;
      user-select: none;
    }

    input, textarea {
      -webkit-user-select: text;
      -moz-user-select: text;
      -ms-user-select: text;
      user-select: text;
    }

    .loading-container {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      background-color: #020617;
      z-index: 9999;
    }

    .spinner {
      width: 50px; height: 50px;
      border: 4px solid rgba(56, 189, 248, 0.2);
      border-top-color: #38BDF8;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .loading-text {
      color: #94A3B8;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      font-size: 14px;
      margin-top: 16px;
    }

    ::-webkit-scrollbar { display: none; }
    * { scroll-behavior: smooth; -webkit-overflow-scrolling: touch; }
  </style>
</head>
<body>
  <noscript>
    <style>
      .seo-content { font-family: sans-serif; max-width: 900px; margin: 0 auto; padding: 2rem; background: #020617; color: #e2e8f0; }
      .seo-content a { color: #38bdf8; }
    </style>
    <div class="seo-content">
      <h1>Gearsh — Book Creative Talent Worldwide</h1>
      <p>The global marketplace to discover and book creative professionals for your events.</p>
      <p><a href="/terms.html">Terms &amp; Conditions</a> | <a href="/privacy">Privacy Policy</a></p>
    </div>
  </noscript>

  <div id="loading" class="loading-container">
    <div class="spinner"></div>
    <p class="loading-text">Loading Gearsh...</p>
  </div>

  <script src="flutter_bootstrap.js?v=2" async></script>

  <script>
    window.addEventListener('flutter-first-frame', function() {
      const loading = document.getElementById('loading');
      if (loading) {
        loading.style.opacity = '0';
        loading.style.transition = 'opacity 0.3s';
        setTimeout(() => loading.remove(), 300);
      }
    });
  </script>
</body>
</html>
