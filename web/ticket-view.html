<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#0A0A0A">
  <title>Your Ticket | Gearsh</title>
  <link rel="icon" type="image/png" href="/icons/Icon-192.png">
  <link rel="stylesheet" href="/gearsh-brand.css">
  <link rel="stylesheet" href="/tickets.css">
  <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.3/build/qrcode.min.js"></script>
</head>
<body>
  <main id="ticket-root" class="tkt-print-sheet"></main>
  <script>
  (function () {
    var code = new URLSearchParams(window.location.search).get('code') || window.location.pathname.split('/').pop();
    var root = document.getElementById('ticket-root');
    if (!code) { root.innerHTML = '<p>Ticket not found</p>'; return; }

    fetch('/api/ticket-instances/' + encodeURIComponent(code))
      .then(function (r) { return r.json(); })
      .then(function (d) {
        if (!d.success) throw new Error(d.error || 'Not found');
        var t = d.data.ticket;
        var when = new Date(t.event.starts_at).toLocaleString('en-ZA', { weekday:'long', day:'numeric', month:'long', hour:'2-digit', minute:'2-digit' });
        root.innerHTML =
          '<div class="tkt-badge">Gearsh digital ticket</div>' +
          '<h1 style="font-family:var(--g-serif);color:var(--g-white);font-size:28px;margin:12px 0">' + t.event.title + '</h1>' +
          '<p style="color:var(--g-text-muted)">' + t.tier_name + '<br>' + when + '<br>' + t.event.venue + ', ' + t.event.city + '</p>' +
          '<div class="tkt-qr-wrap"><canvas id="qr"></canvas></div>' +
          '<div class="tkt-ticket-code" style="display:inline-block;margin-bottom:8px">' + t.ticket_code + '</div>' +
          '<p style="font-size:13px;color:var(--g-text-muted)">' + (t.holder_name || 'Ticket holder') + '</p>' +
          '<button onclick="window.print()" class="btn-main" style="margin-top:20px">Print / Save PDF</button>';
        QRCode.toCanvas(document.getElementById('qr'), t.qr_payload, { width: 200, margin: 1 });
        document.title = t.ticket_code + ' | Gearsh';
      })
      .catch(function (e) { root.innerHTML = '<p>' + e.message + '</p>'; });
  })();
  </script>
</body>
</html>
